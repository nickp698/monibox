workflows:
  ios-capacitor:
    name: Monibox iOS (Capacitor)
    max_build_duration: 60
    instance_type: mac_mini_m2

    environment:
      groups:
        - app_store_connect
      node: 18.19.0
      xcode: 15.4
      cocoapods: default
      vars:
        BUNDLE_ID: "ai.monibox.app"
        XCODE_WORKSPACE: "ios/App/App.xcworkspace"
        XCODE_SCHEME: "App"

    triggering:
      events:
        - push
      branch_patterns:
        - pattern: main
          include: true

    scripts:
      - name: Install dependencies
        script: npm install

      - name: Sync Capacitor
        script: npx cap sync ios

      - name: Install CocoaPods
        script: |
          cd ios/App
          pod install

      - name: Set up code signing
        script: |
          keychain initialize
          app-store-connect fetch-signing-files "$BUNDLE_ID" \\
            --type IOS_APP_STORE \\
            --create
          keychain add-certificates
          xcode-project use-profiles

      - name: Increment build number
        script: |
          cd ios/App
          LATEST_BUILD=$(app-store-connect get-latest-app-store-build-number "$BUNDLE_ID" || echo 0)
          agvtool new-version -all $(($LATEST_BUILD + 1))

      - name: Build iOS
        script: |
          xcode-project build-ipa \\
            --workspace "ios/App/$XCODE_WORKSPACE" \\
            --scheme "$XCODE_SCHEME"

    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
      - $HOME/Library/Developer/Xcode/DerivedData/**/Build/**/*.dSYM

    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
        expire_build_submitted_for_review: true
      email:
        recipients:
          - phillips.nickj@gmail.com
        notify:
          success: true
          failure: true
