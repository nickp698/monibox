<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Monibox</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, BlinkMacSystemFont, sans-serif; background: #1a2e23; color: white; display: flex; align-items: center; justify-content: center; min-height: 100vh; }
.loader { text-align: center; }
.loader h1 { font-size: 28px; font-weight: 300; margin-bottom: 8px; }
.loader p { font-size: 14px; opacity: 0.7; }
.spinner { width: 32px; height: 32px; border: 3px solid rgba(255,255,255,0.2); border-top-color: white; border-radius: 50%; animation: spin 0.8s linear infinite; margin: 20px auto 0; }
@keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>
<div class="loader">
<h1>Monibox</h1>
<p>Loading your finances...</p>
<div class="spinner"></div>
</div>
<script>window.location.href = "https://monibox.ai";</script>
</body>
</html>
